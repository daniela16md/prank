<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Click here</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #f0f0f0;
            touch-action: manipulation;
        }

        button {
            position: absolute;
            padding: 14px 24px;
            font-size: 18px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            z-index: 1;
        }

        #title {
            text-align: center;
            margin-top: 20px;
            font-size: 24px;
        }

        /* Popup overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
        }

        #overlay.show {
            display: flex;
        }

        #popup {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: pop 0.3s ease;
        }

        #popup button {
            position: static;
            margin-top: 15px;
            background-color: #28a745;
        }

        @keyframes pop {
            from {
                transform: scale(0.7);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div id="title">Click the button</div>

    <!-- Start button centered -->
    <button id="startBtn" style="left:50%; top:50%; transform:translate(-50%, -50%);">
        Click here
    </button>

    <!-- Popup -->
    <div id="overlay">
        <div id="popup">
            <p>April Fools 😈</p>
            <button id="closeBtn">OK</button>
        </div>
    </div>

    <script>
        let count = 0;
        const maxButtons = 20;

        function showPopup() {
            document.getElementById("overlay").classList.add("show");
        }

        document.getElementById("closeBtn").addEventListener("click", () => {
            document.getElementById("overlay").classList.remove("show");
        });

        function getRandomPosition() {
            const x = Math.random() * (window.innerWidth - 140);
            const y = Math.random() * (window.innerHeight - 80);
            return { x, y };
        }

        function spawnButton() {
            count++;

            if (count % 10 === 0) {
                showPopup();
            }

            const btn = document.createElement("button");
            btn.innerText = "Click here";

            const { x, y } = getRandomPosition();

            btn.style.left = `${x}px`;
            btn.style.top = `${y}px`;

            // shrink slightly over time (optional)
            btn.style.transform = `scale(${1 - count * 0.02})`;

            // random color
            btn.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 50%)`;

            btn.addEventListener("click", spawnButton);

            // mobile
            btn.addEventListener("touchstart", () => {
                const { x, y } = getRandomPosition();
                btn.style.left = `${x}px`;
                btn.style.top = `${y}px`;
            });

            // desktop
            btn.addEventListener("mouseover", () => {
                const { x, y } = getRandomPosition();
                btn.style.left = `${x}px`;
                btn.style.top = `${y}px`;
            });

            document.body.appendChild(btn);
        }

        document.getElementById("startBtn").addEventListener("click", spawnButton);
    </script>

</body>
</html>
